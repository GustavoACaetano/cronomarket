name: Deploy VM

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-vm
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        env:
          VM_HOST: ${{ secrets.AZURE_VM_HOST }}
          VM_SSH_KEY: ${{ secrets.AZURE_VM_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$VM_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on Azure VM
        env:
          VM_HOST: ${{ secrets.AZURE_VM_HOST }}
          VM_USER: ${{ secrets.AZURE_VM_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "$VM_USER@$VM_HOST" 'bash -se' <<'REMOTE'
          set -euo pipefail
          cd ~/cronomarket
          git fetch origin main
          git reset --hard origin/main
          docker compose up -d --build --remove-orphans
          docker image prune -f
          docker compose ps
          REMOTE
